name: Blog Refresh

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Blog slug to refresh"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run blog:refresh -- ${{ github.event.inputs.slug }}
      - run: npm run build
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(blog): refresh ${{ github.event.inputs.slug }}"
          title: "Refresh blog post: ${{ github.event.inputs.slug }}"
          body: "Automated refresh scaffold. Review content before merging. Rollback by closing this PR."
          branch: "blog-refresh/${{ github.event.inputs.slug }}"
