name: Content Publisher

# Scheduled 3x/week editorial post. Manual dispatch for an on-demand topic.
on:
  schedule:
    - cron: '0 9 * * 1,3,5' # Mon / Wed / Fri, 09:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional specific topic to publish now'
        required: false
        type: string

permissions:
  contents: write

# Serialize with the radar so the two never race on a push to main.
concurrency:
  group: dex-content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RESEARCH_MODEL: gpt-5.5
      DRAFT_MODEL: gpt-5-mini
      CRITIC_MODEL: gpt-5.5
      GEMMA_MODEL: google/gemma-4-31b-it:free
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
      CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
      WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
      WHATSAPP_TEMPLATE: ${{ secrets.WHATSAPP_TEMPLATE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install edge-tts

      - name: Generate + publish one post
        env:
          TOPIC: ${{ github.event.inputs.topic }}
        run: node scripts/agent/run-auto.mjs --publish

      - name: Build check (validates the new post renders)
        run: npm run build

      - name: Commit new content
        run: |
          git config user.name "DEX Content Agent"
          git config user.email "actions@github.com"
          for p in content/blog public/blog data/blog/pending public/rss.xml public/sitemap.xml; do git add "$p" 2>/dev/null || true; done
          if git diff --cached --quiet; then
            echo "No new post this run — nothing to commit."
          else
            git commit -m "content: scheduled post $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
