name: Content Radar

# Cheap frequent scan of free feeds. Publishes ONLY if a major breaking story
# appears between scheduled posts (Gemma-gated, so most runs cost ~nothing).
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dex-content
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RESEARCH_MODEL: gpt-5.5
      DRAFT_MODEL: gpt-5-mini
      CRITIC_MODEL: gpt-5.5
      GEMMA_MODEL: google/gemma-4-31b-it:free
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
      CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
      WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
      WHATSAPP_TEMPLATE: ${{ secrets.WHATSAPP_TEMPLATE }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install edge-tts

      - name: Scan for breaking stories (publish only if major)
        run: node scripts/agent/run-auto.mjs --radar

      - name: Build check
        run: npm run build

      - name: Commit if a breaking post was created
        run: |
          git config user.name "DEX Content Agent"
          git config user.email "actions@github.com"
          for p in content/blog public/blog data/blog/pending public/rss.xml public/sitemap.xml; do git add "$p" 2>/dev/null || true; done
          if git diff --cached --quiet; then
            echo "No breaking story — nothing to commit."
          else
            git commit -m "content: breaking post $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          fi
