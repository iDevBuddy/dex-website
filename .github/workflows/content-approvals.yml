name: Content Approvals

# Polls ClickUp: publishes approved drafts, runs on-demand "WRITE:" requests,
# discards rejected drafts. Cheap unless there is something to act on.
on:
  schedule:
    - cron: '0 */2 * * *' # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dex-content
  cancel-in-progress: false

jobs:
  approvals:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RESEARCH_MODEL: gpt-5.5
      DRAFT_MODEL: gpt-5-mini
      CRITIC_MODEL: gpt-5.5
      GEMMA_MODEL: google/gemma-4-31b-it:free
      CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
      CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
      WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install edge-tts

      - name: Reconcile approvals / requests / rejects
        run: node scripts/agent/run-approvals.mjs

      - name: Build check
        run: npm run build

      - name: Commit changes
        run: |
          git config user.name "DEX Content Agent"
          git config user.email "actions@github.com"
          git add content/blog public/blog data/blog/pending public/rss.xml public/sitemap.xml
          if git diff --cached --quiet; then
            echo "Nothing to reconcile."
          else
            git commit -m "content: reconcile approvals $(date -u +%F-%H%M)"
            git pull --rebase --autostash origin main
            git push
          fi
