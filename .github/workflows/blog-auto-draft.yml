name: Blog Auto Draft

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Authority sprint or normal schedule mode'
        required: false
        default: sprint
        type: choice
        options:
          - sprint
          - normal
      topic:
        description: 'Optional topic to draft'
        required: false
        type: string
      contentType:
        description: 'Optional content type'
        required: false
        type: string
      forceDraft:
        description: 'Allow drafting even if topic score is below threshold'
        required: false
        default: false
        type: boolean
      dryRun:
        description: 'Run without writing publishable artifacts'
        required: false
        default: false
        type: boolean
      command:
        description: 'Internal Slack command route'
        required: false
        type: string
      requested_by:
        description: 'Requester'
        required: false
        type: string
      slug:
        description: 'Draft slug for approval actions'
        required: false
        type: string
      url:
        description: 'Article URL for image/audio/refresh actions'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL }}
      BRAND_NAME: ${{ vars.BRAND_NAME }}
      AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
      USE_SLACK: ${{ vars.USE_SLACK }}
      SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
      USE_NOTION: ${{ vars.USE_NOTION }}
      NOTION_API_KEY: ${{ vars.NOTION_API_KEY }}
      NOTION_BLOG_IDEAS_DB_ID: ${{ vars.NOTION_BLOG_IDEAS_DB_ID }}
      NOTION_BLOG_DRAFTS_DB_ID: ${{ vars.NOTION_BLOG_DRAFTS_DB_ID }}
      NOTION_PUBLISHED_POSTS_DB_ID: ${{ vars.NOTION_PUBLISHED_POSTS_DB_ID }}
      NOTION_REFRESH_QUEUE_DB_ID: ${{ vars.NOTION_REFRESH_QUEUE_DB_ID }}
      NOTION_PERFORMANCE_REPORTS_DB_ID: ${{ vars.NOTION_PERFORMANCE_REPORTS_DB_ID }}
      LOCAL_LLM_URL: ${{ vars.LOCAL_LLM_URL }}
      LOCAL_LLM_MODEL: ${{ vars.LOCAL_LLM_MODEL }}
      REVIEW_LLM_URL: ${{ vars.REVIEW_LLM_URL }}
      REVIEW_LLM_MODEL: ${{ vars.REVIEW_LLM_MODEL }}
      USE_NVIDIA_QWEN: ${{ vars.USE_NVIDIA_QWEN }}
      NVIDIA_LLM_API_KEY: ${{ vars.NVIDIA_LLM_API_KEY }}
      NVIDIA_LLM_URL: ${{ vars.NVIDIA_LLM_URL }}
      NVIDIA_LLM_MODEL: ${{ vars.NVIDIA_LLM_MODEL }}
      NVIDIA_REVIEW_LLM_API_KEY: ${{ vars.NVIDIA_REVIEW_LLM_API_KEY }}
      NVIDIA_REVIEW_LLM_URL: ${{ vars.NVIDIA_REVIEW_LLM_URL }}
      NVIDIA_REVIEW_LLM_MODEL: ${{ vars.NVIDIA_REVIEW_LLM_MODEL }}
      USE_GPT_OSS: ${{ vars.USE_GPT_OSS }}
      USE_GEMMA: ${{ vars.USE_GEMMA }}
      OPENAI_API_KEY: ${{ vars.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      IMAGE_PROVIDER: stable_diffusion
      NVIDIA_API_KEY: ${{ vars.NVIDIA_API_KEY }}
      NVIDIA_NIM_API_KEY: ${{ vars.NVIDIA_NIM_API_KEY }}
      NVIDIA_SD_URL: ${{ vars.NVIDIA_SD_URL }}
      NVIDIA_SD_MODEL: ${{ vars.NVIDIA_SD_MODEL }}
      NVIDIA_IMAGE_SIZE: ${{ vars.NVIDIA_IMAGE_SIZE }}
      NVIDIA_SD_STEPS: ${{ vars.NVIDIA_SD_STEPS }}
      NVIDIA_SD_CFG_SCALE: ${{ vars.NVIDIA_SD_CFG_SCALE }}
      NVIDIA_SD_NEGATIVE_PROMPT: ${{ vars.NVIDIA_SD_NEGATIVE_PROMPT }}
      NVIDIA_IMAGE_TIMEOUT_MS: ${{ vars.NVIDIA_IMAGE_TIMEOUT_MS }}
      USE_LOCAL_TTS: ${{ vars.USE_LOCAL_TTS }}
      TTS_PROVIDER: ${{ vars.TTS_PROVIDER }}
      TTS_API_URL: ${{ vars.TTS_API_URL }}
      NVIDIA_TTS_API_KEY: ${{ vars.NVIDIA_TTS_API_KEY }}
      NVIDIA_TTS_SERVER: ${{ vars.NVIDIA_TTS_SERVER }}
      NVIDIA_TTS_FUNCTION_ID: ${{ vars.NVIDIA_TTS_FUNCTION_ID }}
      NVIDIA_TTS_VOICE: ${{ vars.NVIDIA_TTS_VOICE }}
      NVIDIA_TTS_LANGUAGE_CODE: ${{ vars.NVIDIA_TTS_LANGUAGE_CODE }}
      NVIDIA_TTS_SAMPLE_RATE: ${{ vars.NVIDIA_TTS_SAMPLE_RATE }}
      NVIDIA_TTS_MAX_CHARS: ${{ vars.NVIDIA_TTS_MAX_CHARS }}
      MANUAL_APPROVAL: ${{ vars.MANUAL_APPROVAL }}
      USE_AUTO_PUBLISH: ${{ vars.USE_AUTO_PUBLISH }}
      MIN_QUALITY_SCORE: ${{ vars.MIN_QUALITY_SCORE }}
      MIN_TOPIC_SCORE: ${{ vars.MIN_TOPIC_SCORE }}
      BLOGS_PER_WEEK: ${{ vars.BLOGS_PER_WEEK }}
      BLOG_GENERATION_DAYS: ${{ vars.BLOG_GENERATION_DAYS }}
      BLOG_GENERATION_TIME_UTC: ${{ vars.BLOG_GENERATION_TIME_UTC }}
      BLOG_TIMEZONE: ${{ vars.BLOG_TIMEZONE }}
      DEFAULT_BLOG_TONE: ${{ vars.DEFAULT_BLOG_TONE }}
      DEFAULT_BLOG_STYLE: ${{ vars.DEFAULT_BLOG_STYLE }}
      FIRST_MONTH_AUTHORITY_SPRINT: ${{ vars.FIRST_MONTH_AUTHORITY_SPRINT }}
      AUTHORITY_SPRINT_DAYS: ${{ vars.AUTHORITY_SPRINT_DAYS }}
      AUTHORITY_SPRINT_START_DATE: ${{ vars.AUTHORITY_SPRINT_START_DATE }}
      DAILY_CONTENT_MODE: ${{ vars.DAILY_CONTENT_MODE }}
      DAILY_CONTENT_TARGET: ${{ vars.DAILY_CONTENT_TARGET }}
      REQUIRE_AUTHENTIC_SOURCES: ${{ vars.REQUIRE_AUTHENTIC_SOURCES }}
      MIN_AUTHORITY_SOURCES_PER_ARTICLE: ${{ vars.MIN_AUTHORITY_SOURCES_PER_ARTICLE }}
      MAX_SOURCES_PER_ARTICLE: ${{ vars.MAX_SOURCES_PER_ARTICLE }}
      SOURCE_MIN_AUTHORITY_SCORE: ${{ vars.SOURCE_MIN_AUTHORITY_SCORE }}
      ENABLE_TREND_QUALITY_OVERRIDE: ${{ vars.ENABLE_TREND_QUALITY_OVERRIDE }}
      ENABLE_REALTIME_TRENDS: ${{ vars.ENABLE_REALTIME_TRENDS }}
      TREND_OVERRIDE_MIN_SCORE: ${{ vars.TREND_OVERRIDE_MIN_SCORE }}
      TREND_QUALITY_FLOOR: ${{ vars.TREND_QUALITY_FLOOR }}
      BUSINESS_TREND_OVERRIDE_MIN_SCORE: ${{ vars.BUSINESS_TREND_OVERRIDE_MIN_SCORE }}
      QUALITY_FAILURE_RETRY_ENABLED: ${{ vars.QUALITY_FAILURE_RETRY_ENABLED }}
      QUALITY_FAILURE_MAX_RETRIES: ${{ vars.QUALITY_FAILURE_MAX_RETRIES }}
      ENABLE_DUPLICATE_TOPIC_DETECTION: ${{ vars.ENABLE_DUPLICATE_TOPIC_DETECTION }}
      DUPLICATE_TOPIC_THRESHOLD: ${{ vars.DUPLICATE_TOPIC_THRESHOLD }}
      SIMILAR_TOPIC_THRESHOLD: ${{ vars.SIMILAR_TOPIC_THRESHOLD }}
      ENABLE_AUTHENTICITY_CHECK: ${{ vars.ENABLE_AUTHENTICITY_CHECK }}
      AUTHENTICITY_PROVIDER: ${{ vars.AUTHENTICITY_PROVIDER }}
      HUGGINGFACE_API_TOKEN: ${{ vars.HUGGINGFACE_API_TOKEN }}
      HUGGINGFACE_MODEL: ${{ vars.HUGGINGFACE_MODEL }}
      MIN_AUTHENTICITY_SCORE: ${{ vars.MIN_AUTHENTICITY_SCORE }}
      MIN_AUTHENTICITY_SCORE_FOR_TREND_OVERRIDE: ${{ vars.MIN_AUTHENTICITY_SCORE_FOR_TREND_OVERRIDE }}
      TWITTER_BEARER_TOKEN: ${{ vars.TWITTER_BEARER_TOKEN }}
      DEFAULT_CONTENT_PERSONA: ${{ vars.DEFAULT_CONTENT_PERSONA }}
      DEFAULT_AUTHORITY_ANGLE: ${{ vars.DEFAULT_AUTHORITY_ANGLE }}
      REQUIRE_REAL_LLM: ${{ vars.REQUIRE_REAL_LLM }}
      REQUIRE_REAL_IMAGE_MODEL: ${{ vars.REQUIRE_REAL_IMAGE_MODEL }}
      REQUIRE_REAL_TTS: ${{ vars.REQUIRE_REAL_TTS }}
      ALLOW_FALLBACK_IN_PRODUCTION: ${{ vars.ALLOW_FALLBACK_IN_PRODUCTION }}
      USE_GAMMA: ${{ vars.USE_GAMMA }}
      GAMMA_API_KEY: ${{ vars.GAMMA_API_KEY }}
      SLIDES_PROVIDER: ${{ vars.SLIDES_PROVIDER }}
      INFOGRAPHIC_PROVIDER: ${{ vars.INFOGRAPHIC_PROVIDER }}
      ENABLE_AI_NEWS_TRACKING: ${{ vars.ENABLE_AI_NEWS_TRACKING }}
      AI_NEWS_AUTO_PUBLISH: ${{ vars.AI_NEWS_AUTO_PUBLISH }}
      AI_NEWS_SOURCE_LIMIT: ${{ vars.AI_NEWS_SOURCE_LIMIT }}
      AI_NEWS_RECENCY_HOURS: ${{ vars.AI_NEWS_RECENCY_HOURS }}
      ALLOW_OFFICIAL_IMAGE_PLACEHOLDER: ${{ vars.ALLOW_OFFICIAL_IMAGE_PLACEHOLDER }}
      SEO_AUDIT_MIN_SCORE: ${{ vars.SEO_AUDIT_MIN_SCORE }}
      TAVILY_API_KEY: ${{ vars.TAVILY_API_KEY }}
      MEDIUM_INTEGRATION_TOKEN: ${{ vars.MEDIUM_INTEGRATION_TOKEN }}
      MEDIUM_PUBLISH_STATUS: ${{ vars.MEDIUM_PUBLISH_STATUS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for NVIDIA TTS
        if: env.TTS_PROVIDER == 'nvidia_tts' || env.TTS_PROVIDER == 'nvidia_riva'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install NVIDIA Riva client
        if: env.TTS_PROVIDER == 'nvidia_tts' || env.TTS_PROVIDER == 'nvidia_riva'
        run: pip install nvidia-riva-client

      - name: Validate schedule
        run: npm run blog:schedule:test

      - name: Validate image provider configuration
        run: npm run blog:image:check

      - name: Respect sprint or normal schedule
        id: schedule_gate
        if: github.event_name == 'schedule'
        run: |
          if [ "$FIRST_MONTH_AUTHORITY_SPRINT" = "true" ]; then
            echo "Authority sprint is active; daily draft allowed."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "$DAY" = "2" ] || [ "$DAY" = "4" ] || [ "$DAY" = "6" ]; then
            echo "Normal configured draft day."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Not a normal draft day after sprint. Exiting cleanly."
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Run blog automation command
        if: steps.schedule_gate.outputs.skip != 'true'
        id: automation
        run: |
          COMMAND="${{ github.event.inputs.command }}"
          if [ -z "$COMMAND" ]; then COMMAND="draft"; fi
          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"
          ARGS="--manual-approval"
          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.forceDraft }}" = "true" ]; then ARGS="$ARGS --force-draft"; fi
          if [ -n "${{ github.event.inputs.topic }}" ]; then ARGS="$ARGS --topic \"${{ github.event.inputs.topic }}\""; fi
          if [ -n "${{ github.event.inputs.contentType }}" ]; then echo "Content type: ${{ github.event.inputs.contentType }}"; fi
          if [ "$COMMAND" = "ideas" ]; then
            npm run blog:discover
            npm run blog:score
          elif [ "$COMMAND" = "approve_publish" ]; then
            INPUT_SLUG="${{ github.event.inputs.slug }}"
            DRAFT_SLUG=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('data/blog/draft-article.json','utf8')).frontmatter?.slug||'')}catch{console.log('')}")
            if [ -n "$INPUT_SLUG" ] && [ "$DRAFT_SLUG" != "$INPUT_SLUG" ]; then
              echo "Approved draft slug '$INPUT_SLUG' was not found in committed draft packet. Create/commit the draft packet before approval."
              exit 1
            fi
            if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
              npm run blog:publish -- --force --auto-publish --dry-run
            else
              npm run blog:publish -- --force --auto-publish
            fi
          elif [ "$COMMAND" = "generate_image" ] || [ "$COMMAND" = "regenerate_image" ]; then
            npm run blog:image
          elif [ "$COMMAND" = "generate_audio" ]; then
            npm run blog:audio
          elif [ "$COMMAND" = "generate_slides" ]; then
            npm run blog:slides
          elif [ "$COMMAND" = "generate_infographic" ]; then
            npm run blog:infographic
          elif [ "$COMMAND" = "adsense_status" ]; then
            npm run blog:adsense
          elif [ "$COMMAND" = "sources_latest" ]; then
            npm run blog:sources
          elif [ "$COMMAND" = "improve_sources" ]; then
            npm run blog:sources -- --improve
          else
            echo "Running npm run blog:pipeline -- $ARGS"
            eval "npm run blog:pipeline -- $ARGS"
          fi

      - name: Build check
        if: steps.schedule_gate.outputs.skip != 'true'
        run: npm run build

      - name: Commit draft packet for manual approval
        if: steps.schedule_gate.outputs.skip != 'true' && env.USE_AUTO_PUBLISH != 'true' && steps.automation.outputs.command != 'approve_publish' && github.event.inputs.dryRun != 'true'
        run: |
          git config user.name "AI Blog Engine"
          git config user.email "actions@github.com"
          git add data/blog public/blog
          if git diff --cached --quiet; then
            echo "No draft artifacts to commit."
          else
            git commit -m "chore: create AI blog draft for approval"
            git push
          fi

      - name: Commit approved published post
        if: steps.schedule_gate.outputs.skip != 'true' && env.USE_AUTO_PUBLISH == 'true'
        run: |
          git config user.name "AI Blog Engine"
          git config user.email "actions@github.com"
          git add content/blog public/blog data/blog
          if git diff --cached --quiet; then
            echo "No publishable changes to commit."
          else
            git commit -m "chore: publish approved AI blog draft"
            git push
          fi

      - name: Commit latest approved publish request
        if: steps.schedule_gate.outputs.skip != 'true' && steps.automation.outputs.command == 'approve_publish'
        run: |
          git config user.name "AI Blog Engine"
          git config user.email "actions@github.com"
          git add content/blog public/blog data/blog
          if git diff --cached --quiet; then
            echo "No approved publish changes to commit."
          else
            git commit -m "chore: publish latest approved AI blog"
            git push
          fi

      - name: Cross-post to Medium
        if: steps.schedule_gate.outputs.skip != 'true' && steps.automation.outputs.command == 'approve_publish' && env.MEDIUM_INTEGRATION_TOKEN != ''
        run: npm run blog:crosspost
